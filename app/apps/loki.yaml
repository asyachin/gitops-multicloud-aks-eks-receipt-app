apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    # Wave 2 — needs gp3 StorageClass (wave 1) for PVC
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.x"
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        loki:
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          auth_enabled: false

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          persistence:
            enabled: true
            storageClass: gp3
            size: 10Gi

        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        grafana:
          enabled: false
        promtail:
          enabled: false
        gateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
