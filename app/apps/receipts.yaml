apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: receipts
  namespace: argocd
  annotations:
    # Wave 4 — needs storage (wave 1) for postgres PVC and
    # sealed-secrets (wave 1) to decrypt app-secret and db-credentials
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/asyachin/gitops-multicloud-aks-eks-receipt-app
    targetRevision: dev
    path: app/receipts
  destination:
    server: https://kubernetes.default.svc
    namespace: receipts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
