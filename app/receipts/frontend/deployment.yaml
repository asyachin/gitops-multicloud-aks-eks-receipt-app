apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: receipts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: u745/recipebook-frontend:latest
          ports:
            - containerPort: 80
          env:
            # Nginx template nginx.conf.tpl uses these variables
            - name: APP_HOST
              value: backend
            - name: APP_PORT
              value: "9000"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi