apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  # Ensure ArgoCD deletes all managed resources when the Application is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.x"
    helm:
      releaseName: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    # Installed in kube-system so the controller can access secrets cluster-wide
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
