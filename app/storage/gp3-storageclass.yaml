apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    # Set gp3 as the default StorageClass — cheaper and faster than gp2
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
parameters:
  type: gp3
  # 3000 IOPS and 125 MB/s throughput are included at no extra cost with gp3
  iops: "3000"
  throughput: "125"
  fsType: ext4
